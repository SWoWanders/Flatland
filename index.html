<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flatland: A Romance of Many Dimensions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        
        body {
            background: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        
        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        .ui-element {
            pointer-events: auto;
        }
        
        #dialogue {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #4a4a4a;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            display: none;
            pointer-events: auto;
            max-height: 200px;
            overflow-y: auto;
        }
        
        #dialogue .speaker {
            color: #ffd700;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        #dialogue .text {
            color: #e0e0e0;
        }
        
        #dialogue .continue {
            color: #888;
            font-size: 12px;
            margin-top: 10px;
            text-align: center;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
        
        #inventory {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4a4a4a;
            padding: 10px;
            font-size: 12px;
            display: none;
        }
        
        #stats {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4a4a4a;
            padding: 10px;
            font-size: 12px;
        }
        
        .stat {
            margin: 5px 0;
        }
        
        .stat-label {
            color: #888;
        }
        
        .stat-value {
            color: #fff;
        }
        
        #touchControls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            display: none;
        }
        
        .d-pad {
            width: 120px;
            height: 120px;
            position: relative;
        }
        
        .d-pad-btn {
            position: absolute;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
        }
        
        .d-pad-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .d-pad-up { top: 0; left: 40px; }
        .d-pad-down { bottom: 0; left: 40px; }
        .d-pad-left { top: 40px; left: 0; }
        .d-pad-right { top: 40px; right: 0; }
        
        #actionBtn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: rgba(255, 215, 0, 0.2);
            border: 2px solid rgba(255, 215, 0, 0.5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #ffd700;
            pointer-events: auto;
        }
        
        #actionBtn:active {
            background: rgba(255, 215, 0, 0.4);
        }
        
        #menuBtn {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #4a4a4a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            pointer-events: auto;
        }
        
        #mainMenu, #pauseMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }
        
        .menu-title {
            font-size: 32px;
            color: #ffd700;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 2px 2px 0 #4a4a4a;
        }
        
        .menu-btn {
            width: 200px;
            padding: 15px;
            margin: 10px;
            background: transparent;
            border: 2px solid #4a4a4a;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .menu-btn:hover, .menu-btn:active {
            background: #4a4a4a;
            border-color: #ffd700;
            color: #ffd700;
        }
        
        #loading {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .loading-text {
            color: #ffd700;
            font-size: 20px;
            margin-top: 20px;
        }
        
        .loading-bar {
            width: 200px;
            height: 4px;
            background: #4a4a4a;
            margin-top: 20px;
        }
        
        .loading-progress {
            width: 0%;
            height: 100%;
            background: #ffd700;
            transition: width 0.3s;
        }
        
        .hidden {
            display: none !important;
        }
        
        #dimensionIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            color: rgba(255, 215, 0, 0.3);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        .damage-number {
            position: absolute;
            color: #ff4444;
            font-weight: bold;
            font-size: 16px;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            to {
                transform: translateY(-50px);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-text">Initializing Flatland...</div>
        <div class="loading-bar">
            <div class="loading-progress" id="loadingProgress"></div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>
    
    <div id="dimensionIndicator">3D</div>
    
    <div id="ui">
        <div id="stats">
            <div class="stat">
                <span class="stat-label">Shape:</span>
                <span class="stat-value" id="playerShape">Square</span>
            </div>
            <div class="stat">
                <span class="stat-label">Sides:</span>
                <span class="stat-value" id="playerSides">4</span>
            </div>
            <div class="stat">
                <span class="stat-label">Dimension:</span>
                <span class="stat-value" id="currentDimension">Flatland</span>
            </div>
            <div class="stat">
                <span class="stat-label">Knowledge:</span>
                <span class="stat-value" id="knowledgeLevel">0</span>
            </div>
        </div>
        
        <div id="menuBtn">☰</div>
        
        <div id="dialogue">
            <div class="speaker" id="speakerName">A Square</div>
            <div class="text" id="dialogueText">Welcome to Flatland...</div>
            <div class="continue">Tap to continue</div>
        </div>
        
        <div id="touchControls">
            <div class="d-pad">
                <div class="d-pad-btn d-pad-up" data-dir="up">▲</div>
                <div class="d-pad-btn d-pad-down" data-dir="down">▼</div>
                <div class="d-pad-btn d-pad-left" data-dir="left">◀</div>
                <div class="d-pad-btn d-pad-right" data-dir="right">▶</div>
            </div>
        </div>
        
        <div id="actionBtn" class="hidden">ACT</div>
    </div>
    
    <div id="mainMenu" class="hidden">
        <h1 class="menu-title">FLATLAND<br><small>A Romance of Many Dimensions</small></h1>
        <button class="menu-btn" onclick="game.start()">New Game</button>
        <button class="menu-btn" onclick="game.showHelp()">How to Play</button>
        <button class="menu-btn" onclick="game.showAbout()">About</button>
    </div>
    
    <div id="pauseMenu" class="hidden">
        <h1 class="menu-title">Paused</h1>
        <button class="menu-btn" onclick="game.resume()">Resume</button>
        <button class="menu-btn" onclick="game.saveGame()">Save Game</button>
        <button class="menu-btn" onclick="game.quitToMenu()">Quit to Menu</button>
    </div>

    <script>
        // Audio System - Retro Sound Effects
        class AudioSystem {
            constructor() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.sounds = {};
                this.muted = false;
            }
            
            generateTone(freq, duration, type = 'square', fade = true) {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                
                if (fade) {
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                } else {
                    gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
                }
                
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                
                osc.start();
                osc.stop(this.ctx.currentTime + duration);
            }
            
            playSound(name) {
                if (this.muted) return;
                
                switch(name) {
                    case 'step':
                        this.generateTone(200, 0.1, 'square');
                        break;
                    case 'bump':
                        this.generateTone(100, 0.2, 'sawtooth');
                        break;
                    case 'dialogue':
                        this.generateTone(800, 0.05, 'square');
                        break;
                    case 'dimensionShift':
                        this.playChord([440, 554, 659], 1);
                        break;
                    case 'collect':
                        this.generateTone(880, 0.1, 'square');
                        setTimeout(() => this.generateTone(1100, 0.2, 'square'), 100);
                        break;
                    case 'attack':
                        this.generateTone(150, 0.3, 'sawtooth');
                        break;
                    case 'damage':
                        this.generateTone(80, 0.4, 'sawtooth');
                        break;
                    case 'levelUp':
                        this.playArpeggio([440, 554, 659, 880], 0.5);
                        break;
                    case 'hover':
                        this.generateTone(600, 0.05, 'sine', false);
                        break;
                    case 'select':
                        this.generateTone(400, 0.1, 'square');
                        break;
                }
            }
            
            playChord(freqs, duration) {
                freqs.forEach((freq, i) => {
                    setTimeout(() => this.generateTone(freq, duration, 'sine'), i * 50);
                });
            }
            
            playArpeggio(freqs, duration) {
                freqs.forEach((freq, i) => {
                    setTimeout(() => this.generateTone(freq, duration, 'square'), i * 100);
                });
            }
            
            playBGM() {
                // Simple ambient drone
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(110, this.ctx.currentTime);
                gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.start();
                this.bgmOsc = osc;
            }
            
            stopBGM() {
                if (this.bgmOsc) {
                    this.bgmOsc.stop();
                    this.bgmOsc = null;
                }
            }
        }

        // Procedural Sprite Generator
        class SpriteGenerator {
            constructor() {
                this.cache = {};
            }
            
            generatePolygon(sides, size, color, irregular = 0) {
                const key = `poly_${sides}_${size}_${color}_${irregular}`;
                if (this.cache[key]) return this.cache[key];
                
                const canvas = document.createElement('canvas');
                canvas.width = size * 2;
                canvas.height = size * 2;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = color;
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 2;
                
                ctx.beginPath();
                for (let i = 0; i < sides; i++) {
                    const angle = (i / sides) * Math.PI * 2 - Math.PI / 2;
                    const r = size * (1 + (Math.random() - 0.5) * irregular);
                    const x = size + Math.cos(angle) * r;
                    const y = size + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Add shading
                const gradient = ctx.createRadialGradient(size, size, 0, size, size, size);
                gradient.addColorStop(0, 'rgba(255,255,255,0.3)');
                gradient.addColorStop(1, 'rgba(0,0,0,0.3)');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                this.cache[key] = canvas;
                return canvas;
            }
            
            generateLine(length, thickness, color) {
                const key = `line_${length}_${thickness}_${color}`;
                if (this.cache[key]) return this.cache[key];
                
                const canvas = document.createElement('canvas');
                canvas.width = length;
                canvas.height = thickness * 3;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = color;
                ctx.fillRect(0, thickness, length, thickness);
                
                // Glow effect
                ctx.shadowBlur = 10;
                ctx.shadowColor = color;
                ctx.fillRect(0, thickness, length, thickness);
                
                this.cache[key] = canvas;
                return canvas;
            }
            
            generateCircle(radius, color) {
                const key = `circle_${radius}_${color}`;
                if (this.cache[key]) return this.cache[key];
                
                const canvas = document.createElement('canvas');
                canvas.width = radius * 2;
                canvas.height = radius * 2;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(radius, radius, radius, 0, Math.PI * 2);
                ctx.fill();
                
                // Mystical glow
                const gradient = ctx.createRadialGradient(radius, radius, radius * 0.5, radius, radius, radius);
                gradient.addColorStop(0, 'rgba(255,255,255,0.5)');
                gradient.addColorStop(1, 'rgba(255,215,0,0.2)');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                this.cache[key] = canvas;
                return canvas;
            }
            
            generateParticle(size, color) {
                const canvas = document.createElement('canvas');
                canvas.width = size * 2;
                canvas.height = size * 2;
                const ctx = canvas.getContext('2d');
                
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(size, size, size, 0, Math.PI * 2);
                ctx.fill();
                
                return canvas;
            }
            
            generateIcon(type, size) {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                
                switch(type) {
                    case 'knowledge':
                        ctx.fillStyle = '#ffd700';
                        ctx.font = `${size * 0.8}px monospace`;
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText('✦', size/2, size/2);
                        break;
                    case 'dimension':
                        ctx.fillStyle = '#00ffff';
                        ctx.beginPath();
                        ctx.moveTo(size/2, 0);
                        ctx.lineTo(size, size);
                        ctx.lineTo(0, size);
                        ctx.closePath();
                        ctx.fill();
                        break;
                    case 'danger':
                        ctx.fillStyle = '#ff4444';
                        ctx.fillRect(size/4, size/4, size/2, size/2);
                        break;
                }
                
                return canvas;
            }
        }

        // Game Entities
        class Entity {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type;
                this.vx = 0;
                this.vy = 0;
                this.size = 20;
                this.color = '#fff';
                this.sides = 4;
                this.dialogue = [];
                this.interacted = false;
            }
            
            update(dt) {
                this.x += this.vx * dt;
                this.y += this.vy * dt;
            }
            
            render(ctx, sprites) {
                const sprite = sprites.generatePolygon(this.sides, this.size, this.color);
                ctx.drawImage(sprite, this.x - this.size, this.y - this.size);
            }
            
            getBounds() {
                return {
                    left: this.x - this.size,
                    right: this.x + this.size,
                    top: this.y - this.size,
                    bottom: this.y + this.size
                };
            }
            
            interact(player) {
                return false;
            }
        }

        class Player extends Entity {
            constructor(x, y) {
                super(x, y, 'player');
                this.sides = 4;
                this.color = '#4a90e2';
                this.size = 25;
                this.speed = 150;
                this.knowledge = 0;
                this.dimension = 'flatland';
                this.targetSides = 4;
                this.morphProgress = 0;
            }
            
            update(dt) {
                super.update(dt);
                
                // Smooth morphing between shapes
                if (this.sides !== this.targetSides) {
                    this.morphProgress += dt * 2;
                    if (this.morphProgress >= 1) {
                        this.sides = this.targetSides;
                        this.morphProgress = 0;
                    }
                }
            }
            
            render(ctx, sprites) {
                // Morphing visualization
                const currentSides = this.sides === this.targetSides ? 
                    this.sides : 
                    this.sides + (this.targetSides - this.sides) * this.morphProgress;
                
                const sprite = sprites.generatePolygon(
                    Math.round(currentSides), 
                    this.size, 
                    this.color,
                    this.dimension === 'spaceland' ? 0.2 : 0
                );
                
                // Rotation effect in higher dimensions
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.dimension !== 'flatland') {
                    ctx.rotate(Date.now() / 1000);
                }
                ctx.drawImage(sprite, -this.size, -this.size);
                ctx.restore();
            }
            
            evolve() {
                if (this.targetSides < 12) {
                    this.targetSides++;
                    this.knowledge += 10;
                    return true;
                }
                return false;
            }
            
            shiftDimension() {
                const dims = ['flatland', 'lineland', 'spaceland'];
                const idx = dims.indexOf(this.dimension);
                this.dimension = dims[(idx + 1) % dims.length];
                return this.dimension;
            }
        }

        class NPC extends Entity {
            constructor(x, y, role) {
                super(x, y, 'npc');
                this.role = role;
                this.setupRole();
            }
            
            setupRole() {
                switch(this.role) {
                    case 'isosceles':
                        this.sides = 3;
                        this.color = '#8b4513';
                        this.size = 20;
                        this.dialogue = [
                            { speaker: "Isosceles Soldier", text: "I am but a lowly Triangle with two equal sides. Watch my sharp angle!" },
                            { speaker: "Isosceles Soldier", text: "Some say through great deeds, we may rise to become Equilateral..." }
                        ];
                        break;
                    case 'equilateral':
                        this.sides = 3;
                        this.color = '#daa520';
                        this.size = 22;
                        this.dialogue = [
                            { speaker: "Equilateral Tradesman", text: "All three sides equal, all three angles the same. Such is the way of the Middle Class." },
                            { speaker: "Equilateral Tradesman", text: "My son shall have four sides, and enter the Professional class!" }
                        ];
                        break;
                    case 'square':
                        this.sides = 4;
                        this.color = '#4169e1';
                        this.size = 25;
                        this.dialogue = [
                            { speaker: "Square Gentleman", text: "Four sides, four angles, perfect regularity. I am a Professional Man." },
                            { speaker: "Square Gentleman", text: "Have you heard the heresy of the Third Dimension? Preposterous!" }
                        ];
                        break;
                    case 'pentagon':
                        this.sides = 5;
                        this.color = '#9932cc';
                        this.size = 28;
                        this.dialogue = [
                            { speaker: "Pentagon Physician", text: "Five sides bring me closer to the Circular ideal." },
                            { speaker: "Pentagon Physician", text: "The art of Sight Recognition requires great training." }
                        ];
                        break;
                    case 'hexagon':
                        this.sides = 6;
                        this.color = '#ff6347';
                        this.size = 30;
                        this.dialogue = [
                            { speaker: "Hexagon Nobility", text: "Six sides! The lower classes can barely comprehend my angularity." },
                            { speaker: "Hexagon Nobility", text: "My grandson shall have seven sides, if the Law of Nature permits." }
                        ];
                        break;
                    case 'circle':
                        this.sides = 20;
                        this.color = '#ffd700';
                        this.size = 35;
                        this.dialogue = [
                            { speaker: "Circle Priest", text: "I am many-sided, approaching the limit of perfection." },
                            { speaker: "Circle Priest", text: "Attend to your Configuration, for Configuration makes the man." }
                        ];
                        break;
                    case 'sphere':
                        this.sides = 20;
                        this.color = '#00ffff';
                        this.size = 40;
                        this.dialogue = [
                            { speaker: "The Sphere", text: "Behold, I come from Space, from the Land of Three Dimensions!" },
                            { speaker: "The Sphere", text: "Upward, not Northward! That is the direction of the Third Dimension." },
                            { speaker: "The Sphere", text: "I have watched you from above, seeing your insides as clearly as your outsides." }
                        ];
                        break;
                    case 'king':
                        this.sides = 1;
                        this.color = '#ff0000';
                        this.size = 30;
                        this.dialogue = [
                            { speaker: "King of Lineland", text: "I am the Monarch of this Straight Line! All is Length here." },
                            { speaker: "King of Lineland", text: "What? Left and right? I know only Northward and Southward!" }
                        ];
                        break;
                    case 'point':
                        this.sides = 1;
                        this.color = '#ffffff';
                        this.size = 5;
                        this.dialogue = [
                            { speaker: "Pointland Monarch", text: "It is; and there is none else beside It." },
                            { speaker: "Pointland Monarch", text: "Infinite beatitude of existence!" }
                        ];
                        break;
                }
            }
            
            interact(player) {
                if (this.dialogue.length > 0) {
                    const line = this.dialogue[Math.floor(Math.random() * this.dialogue.length)];
                    return line;
                }
                return null;
            }
        }

        class Collectible extends Entity {
            constructor(x, y, type) {
                super(x, y, 'collectible');
                this.collectType = type;
                this.size = 15;
                this.bobOffset = Math.random() * Math.PI * 2;
                
                switch(type) {
                    case 'knowledge':
                        this.color = '#ffd700';
                        break;
                    case 'dimension_shard':
                        this.color = '#00ffff';
                        break;
                    case 'color_potion':
                        this.color = '#ff00ff';
                        break;
                }
            }
            
            update(dt) {
                this.bobOffset += dt * 3;
            }
            
            render(ctx, sprites) {
                const bob = Math.sin(this.bobOffset) * 5;
                const sprite = sprites.generateIcon(
                    this.collectType === 'knowledge' ? 'knowledge' : 'dimension',
                    this.size * 2
                );
                ctx.drawImage(sprite, this.x - this.size, this.y - this.size + bob);
            }
            
            collect(player) {
                switch(this.collectType) {
                    case 'knowledge':
                        player.knowledge += 5;
                        return "Gained Knowledge! The mysteries of geometry unfold...";
                    case 'dimension_shard':
                        return "A shard of higher dimensional space! The world shifts...";
                    case 'color_potion':
                        return "The forbidden Chromatic art! Colors flow through you...";
                }
            }
        }

        // Particle System
        class ParticleSystem {
            constructor() {
                this.particles = [];
            }
            
            emit(x, y, color, count = 5) {
                for (let i = 0; i < count; i++) {
                    this.particles.push({
                        x: x,
                        y: y,
                        vx: (Math.random() - 0.5) * 100,
                        vy: (Math.random() - 0.5) * 100,
                        life: 1,
                        color: color,
                        size: Math.random() * 5 + 2
                    });
                }
            }
            
            update(dt) {
                this.particles = this.particles.filter(p => {
                    p.x += p.vx * dt;
                    p.y += p.vy * dt;
                    p.life -= dt * 2;
                    p.vy += 50 * dt; // gravity
                    return p.life > 0;
                });
            }
            
            render(ctx, sprites) {
                this.particles.forEach(p => {
                    ctx.globalAlpha = p.life;
                    const sprite = sprites.generateParticle(p.size, p.color);
                    ctx.drawImage(sprite, p.x - p.size, p.y - p.size);
                });
                ctx.globalAlpha = 1;
            }
        }

        // Main Game Class
        class FlatlandGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.audio = new AudioSystem();
                this.sprites = new SpriteGenerator();
                this.particles = new ParticleSystem();
                
                this.state = 'loading';
                this.entities = [];
                this.player = null;
                this.camera = { x: 0, y: 0 };
                this.dialogueQueue = [];
                this.currentDialogue = null;
                
                this.keys = {};
                this.touchInput = { dx: 0, dy: 0, action: false };
                
                this.lastTime = 0;
                this.accumulator = 0;
                this.step = 1/60;
                
                this.worldSize = { width: 2000, height: 2000 };
                this.currentScene = 'flatland_city';
                
                this.setupCanvas();
                this.setupInput();
                this.loadGame();
            }
            
            setupCanvas() {
                const resize = () => {
                    this.canvas.width = window.innerWidth;
                    this.canvas.height = window.innerHeight;
                    this.ctx.imageSmoothingEnabled = false;
                };
                window.addEventListener('resize', resize);
                resize();
            }
            
            setupInput() {
                // Keyboard
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if (e.key === 'Escape') this.togglePause();
                    if (e.key === ' ' || e.key === 'Enter') this.advanceDialogue();
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key] = false;
                });
                
                // Touch controls
                const dPad = document.querySelectorAll('.d-pad-btn');
                dPad.forEach(btn => {
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        const dir = btn.dataset.dir;
                        this.touchInput.dx = dir === 'left' ? -1 : dir === 'right' ? 1 : 0;
                        this.touchInput.dy = dir === 'up' ? -1 : dir === 'down' ? 1 : 0;
                    });
                    
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.touchInput.dx = 0;
                        this.touchInput.dy = 0;
                    });
                });
                
                const actionBtn = document.getElementById('actionBtn');
                actionBtn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    this.touchInput.action = true;
                });
                
                actionBtn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    this.touchInput.action = false;
                    this.interact();
                });
                
                // Tap to advance dialogue
                document.getElementById('dialogue').addEventListener('click', () => {
                    this.advanceDialogue();
                });
                
                // Menu
                document.getElementById('menuBtn').addEventListener('click', () => {
                    this.togglePause();
                });
            }
            
            loadGame() {
                // Simulate loading
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 10;
                    document.getElementById('loadingProgress').style.width = progress + '%';
                    
                    if (progress >= 100) {
                        clearInterval(interval);
                        setTimeout(() => {
                            document.getElementById('loading').classList.add('hidden');
                            this.showMainMenu();
                        }, 500);
                    }
                }, 100);
            }
            
            showMainMenu() {
                this.state = 'menu';
                document.getElementById('mainMenu').classList.remove('hidden');
                document.getElementById('touchControls').style.display = 'none';
                document.getElementById('actionBtn').classList.add('hidden');
            }
            
            start() {
                document.getElementById('mainMenu').classList.add('hidden');
                document.getElementById('touchControls').style.display = 'block';
                document.getElementById('actionBtn').classList.remove('hidden');
                
                this.state = 'playing';
                this.initWorld();
                this.audio.playBGM();
                this.lastTime = performance.now();
                requestAnimationFrame((t) => this.loop(t));
            }
            
            initWorld() {
                // Create player
                this.player = new Player(this.worldSize.width/2, this.worldSize.height/2);
                
                // Generate world based on current scene
                this.generateScene(this.currentScene);
            }
            
            generateScene(scene) {
                this.entities = [];
                
                switch(scene) {
                    case 'flatland_city':
                        this.generateFlatlandCity();
                        break;
                    case 'lineland':
                        this.generateLineland();
                        break;
                    case 'spaceland':
                        this.generateSpaceland();
                        break;
                    case 'pointland':
                        this.generatePointland();
                        break;
                }
            }
            
            generateFlatlandCity() {
                // Add various NPCs representing Flatland's social hierarchy
                const roles = ['isosceles', 'isosceles', 'equilateral', 'equilateral', 
                              'square', 'square', 'pentagon', 'hexagon', 'circle'];
                
                for (let i = 0; i < 30; i++) {
                    const role = roles[Math.floor(Math.random() * roles.length)];
                    const x = Math.random() * this.worldSize.width;
                    const y = Math.random() * this.worldSize.height;
                    this.entities.push(new NPC(x, y, role));
                }
                
                // Add collectibles
                for (let i = 0; i < 10; i++) {
                    const x = Math.random() * this.worldSize.width;
                    const y = Math.random() * this.worldSize.height;
                    this.entities.push(new Collectible(x, y, 'knowledge'));
                }
                
                // Special NPCs
                this.entities.push(new NPC(this.worldSize.width * 0.8, this.worldSize.height * 0.2, 'sphere'));
            }
            
            generateLineland() {
                // Linear world
                this.worldSize = { width: 3000, height: 100 };
                this.player.y = 50;
                
                for (let i = 0; i < 20; i++) {
                    const x = i * 150 + 100;
                    this.entities.push(new NPC(x, 50, i === 10 ? 'king' : 'point'));
                }
            }
            
            generateSpaceland() {
                this.worldSize = { width: 2000, height: 2000 };
                
                // Floating cubes and spheres
                for (let i = 0; i < 15; i++) {
                    const x = Math.random() * this.worldSize.width;
                    const y = Math.random() * this.worldSize.height;
                    this.entities.push(new Collectible(x, y, 'dimension_shard'));
                }
            }
            
            generatePointland() {
                this.worldSize = { width: 100, height: 100 };
                this.player.x = 50;
                this.player.y = 50;
                this.entities.push(new NPC(50, 50, 'point'));
            }
            
            update(dt) {
                if (this.state !== 'playing') return;
                
                // Player movement
                let dx = 0, dy = 0;
                
                if (this.keys['ArrowUp'] || this.keys['w'] || this.touchInput.dy < 0) dy = -1;
                if (this.keys['ArrowDown'] || this.keys['s'] || this.touchInput.dy > 0) dy = 1;
                if (this.keys['ArrowLeft'] || this.keys['a'] || this.touchInput.dx < 0) dx = -1;
                if (this.keys['ArrowRight'] || this.keys['d'] || this.touchInput.dx > 0) dx = 1;
                
                // Normalize diagonal movement
                if (dx !== 0 || dy !== 0) {
                    const len = Math.sqrt(dx*dx + dy*dy);
                    dx /= len;
                    dy /= len;
                    
                    this.player.vx = dx * this.player.speed;
                    this.player.vy = dy * this.player.speed;
                    
                    // Footstep sounds
                    if (Math.floor(Date.now() / 300) % 2 === 0 && !this.stepSoundPlayed) {
                        this.audio.playSound('step');
                        this.stepSoundPlayed = true;
                    } else if (Math.floor(Date.now() / 300) % 2 === 1) {
                        this.stepSoundPlayed = false;
                    }
                } else {
                    this.player.vx = 0;
                    this.player.vy = 0;
                }
                
                // Update entities
                this.player.update(dt);
                this.entities.forEach(e => e.update(dt));
                this.particles.update(dt);
                
                // World boundaries
                this.player.x = Math.max(this.player.size, Math.min(this.worldSize.width - this.player.size, this.player.x));
                this.player.y = Math.max(this.player.size, Math.min(this.worldSize.height - this.player.size, this.player.y));
                
                // Camera follow
                this.camera.x = this.player.x - this.canvas.width / 2;
                this.camera.y = this.player.y - this.canvas.height / 2;
                
                // Clamp camera
                this.camera.x = Math.max(0, Math.min(this.worldSize.width - this.canvas.width, this.camera.x));
                this.camera.y = Math.max(0, Math.min(this.worldSize.height - this.canvas.height, this.camera.y));
                
                // Collisions and interactions
                this.checkCollisions();
                
                // Update UI
                this.updateUI();
            }
            
            checkCollisions() {
                const playerBounds = this.player.getBounds();
                
                this.entities = this.entities.filter(entity => {
                    if (entity.type === 'collectible') {
                        const dx = this.player.x - entity.x;
                        const dy = this.player.y - entity.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < this.player.size + entity.size) {
                            const msg = entity.collect(this.player);
                            this.audio.playSound('collect');
                            this.particles.emit(entity.x, entity.y, entity.color, 10);
                            this.showDialogue("System", msg);
                            return false;
                        }
                    }
                    return true;
                });
            }
            
            interact() {
                if (this.currentDialogue) {
                    this.advanceDialogue();
                    return;
                }
                
                // Find nearest NPC
                let nearest = null;
                let nearestDist = 100;
                
                this.entities.forEach(entity => {
                    if (entity.type === 'npc') {
                        const dx = this.player.x - entity.x;
                        const dy = this.player.y - entity.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        
                        if (dist < nearestDist) {
                            nearest = entity;
                            nearestDist = dist;
                        }
                    }
                });
                
                if (nearest) {
                    const dialogue = nearest.interact(this.player);
                    if (dialogue) {
                        this.audio.playSound('dialogue');
                        this.showDialogue(dialogue.speaker, dialogue.text);
                        
                        // Special interactions
                        if (nearest.role === 'sphere' && !nearest.interacted) {
                            nearest.interacted = true;
                            this.scheduleDimensionShift();
                        }
                    }
                }
            }
            
            scheduleDimensionShift() {
                setTimeout(() => {
                    this.shiftDimension();
                }, 2000);
            }
            
            shiftDimension() {
                const dims = ['flatland_city', 'lineland', 'spaceland', 'pointland'];
                const currentIdx = dims.indexOf(this.currentScene);
                this.currentScene = dims[(currentIdx + 1) % dims.length];
                
                this.audio.playSound('dimensionShift');
                
                // Visual effect
                const indicator = document.getElementById('dimensionIndicator');
                indicator.textContent = this.currentScene === 'flatland_city' ? '2D' : 
                                       this.currentScene === 'lineland' ? '1D' :
                                       this.currentScene === 'spaceland' ? '3D' : '0D';
                indicator.style.opacity = 1;
                setTimeout(() => indicator.style.opacity = 0, 2000);
                
                this.generateScene(this.currentScene);
                this.player.shiftDimension();
            }
            
            showDialogue(speaker, text) {
                this.dialogueQueue.push({ speaker, text });
                if (!this.currentDialogue) {
                    this.advanceDialogue();
                }
            }
            
            advanceDialogue() {
                if (this.dialogueQueue.length > 0) {
                    this.currentDialogue = this.dialogueQueue.shift();
                    document.getElementById('speakerName').textContent = this.currentDialogue.speaker;
                    document.getElementById('dialogueText').textContent = this.currentDialogue.text;
                    document.getElementById('dialogue').style.display = 'block';
                } else {
                    this.currentDialogue = null;
                    document.getElementById('dialogue').style.display = 'none';
                }
            }
            
            updateUI() {
                document.getElementById('playerShape').textContent = 
                    ['Woman', 'Isosceles', 'Equilateral', 'Square', 'Pentagon', 'Hexagon', 'Heptagon', 'Octagon', 'Nonagon', 'Decagon', 'Hendecagon', 'Dodecagon'][this.player.sides - 1] || 'Polygon';
                document.getElementById('playerSides').textContent = this.player.sides;
                document.getElementById('currentDimension').textContent = 
                    this.currentScene === 'flatland_city' ? 'Flatland' :
                    this.currentScene === 'lineland' ? 'Lineland' :
                    this.currentScene === 'spaceland' ? 'Spaceland' : 'Pointland';
                document.getElementById('knowledgeLevel').textContent = this.player.knowledge;
            }
            
            render() {
                // Clear
                this.ctx.fillStyle = this.currentScene === 'spaceland' ? '#001122' : '#1a1a2e';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                this.ctx.save();
                this.ctx.translate(-this.camera.x, -this.camera.y);
                
                // Grid
                this.renderGrid();
                
                // Entities
                this.entities.forEach(e => e.render(this.ctx, this.sprites));
                this.player.render(this.ctx, this.sprites);
                this.particles.render(this.ctx, this.sprites);
                
                this.ctx.restore();
            }
            
            renderGrid() {
                this.ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
                this.ctx.lineWidth = 1;
                
                const gridSize = 50;
                const startX = Math.floor(this.camera.x / gridSize) * gridSize;
                const startY = Math.floor(this.camera.y / gridSize) * gridSize;
                
                for (let x = startX; x < this.camera.x + this.canvas.width; x += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(x, this.camera.y);
                    this.ctx.lineTo(x, this.camera.y + this.canvas.height);
                    this.ctx.stroke();
                }
                
                for (let y = startY; y < this.camera.y + this.canvas.height; y += gridSize) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.camera.x, y);
                    this.ctx.lineTo(this.camera.x + this.canvas.width, y);
                    this.ctx.stroke();
                }
            }
            
            loop(timestamp) {
                const dt = Math.min((timestamp - this.lastTime) / 1000, 0.1);
                this.lastTime = timestamp;
                
                this.accumulator += dt;
                while (this.accumulator >= this.step) {
                    this.update(this.step);
                    this.accumulator -= this.step;
                }
                
                this.render();
                requestAnimationFrame((t) => this.loop(t));
            }
            
            togglePause() {
                if (this.state === 'playing') {
                    this.state = 'paused';
                    document.getElementById('pauseMenu').classList.remove('hidden');
                } else if (this.state === 'paused') {
                    this.resume();
                }
            }
            
            resume() {
                this.state = 'playing';
                document.getElementById('pauseMenu').classList.add('hidden');
                this.lastTime = performance.now();
                requestAnimationFrame((t) => this.loop(t));
            }
            
            saveGame() {
                const saveData = {
                    player: {
                        x: this.player.x,
                        y: this.player.y,
                        sides: this.player.sides,
                        knowledge: this.player.knowledge,
                        dimension: this.player.dimension
                    },
                    scene: this.currentScene,
                    timestamp: Date.now()
                };
                localStorage.setItem('flatland_save', JSON.stringify(saveData));
                this.showDialogue("System", "Game saved!");
                this.resume();
            }
            
            quitToMenu() {
                this.state = 'menu';
                document.getElementById('pauseMenu').classList.add('hidden');
                this.showMainMenu();
            }
            
            showHelp() {
                alert(`How to Play:
                
Explore the world of Flatland and its neighboring dimensions!

MOVEMENT:
- Use WASD or Arrow Keys (desktop)
- Use D-Pad (mobile touch)

INTERACTION:
- Press SPACE or tap ACT button to talk to NPCs and collect items

DIMENSIONS:
- Start in Flatland (2D)
- Meet the Sphere to travel to Lineland (1D), Spaceland (3D), and Pointland (0D)

GOAL:
- Gain Knowledge by talking to inhabitants and collecting wisdom
- Evolve your shape from Square to higher polygons
- Discover the secrets of the Third Dimension!

"Upward, not Northward!"`);
            }
            
            showAbout() {
                alert(`Flatland: A Romance of Many Dimensions
Based on the 1884 novella by Edwin A. Abbott

A Square's journey through the dimensions, from the lines of Lineland to the solids of Spaceland, and beyond.

"Be patient, for the world is broad and wide"`);
            }
        }

        // Initialize game
        const game = new FlatlandGame();
    </script>
